<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
      background: black;
      font-family: Roboto, sans-serif;
    }

    .channels-section {
      overflow-x: auto;
      padding: 0;
    }

    .channels-group {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .channel-tooltip {
      margin: 20px 10px;
      color: white;
      background-color: rgb(30, 30, 30);
      padding: 15px 15px;
      border-radius: 10px;
      width: 170px;
      height: 170px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 15px;
      text-align: center;
    }

    .channel-pfp {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 99px;
    }

    .channel-name {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .channel-views {
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="channels-group">
    <div class="channel-tooltip">
      <div class="channel-pfp-container">
        <img class="channel-pfp" src="img.png" alt="img">
      </div>
      <div class="channel-info-container">
        <div class="channel-name">Shantist</div>
        <div class="channel-views">1,347,902 Views</div>
        <div class="channel-subs">1,375 Subscribers</div>
      </div>
    </div>
</body>

</html>
