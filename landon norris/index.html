<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
      min-height: 90vh;
      background-color: rgb(36, 36, 36);
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    a {
      color: orange;
      font-size: 40px;
      font-weight: 900;
      font-family: sans-serif;
      text-decoration: none;
      display: flex;
      overflow: hidden;
      /* This crops the text as it rolls */
      height: 1.1em;
      /* Keeps the container tight to one line */
      line-height: 1.1em;
    }

    a span {
      position: relative;
      display: inline-block;
      text-transform: uppercase;
      transition: transform 0.4s cubic-bezier(0.76, 0, 0.24, 1);
      /* The delay is set via a variable --i */
      transition-delay: calc(var(--i) * 0.03s);
    }

    /* The shadow text effect */
    a span::after {
      content: attr(data-letter);
      /* Gets the letter from HTML */
      position: absolute;
      top: 100%;
      /* Positions the clone directly below */
      left: 0;
      color: white;
      /* Change color of the "roll-in" text */
    }

    a:hover span {
      /* Moves the original up and the pseudo-element into view */
      transform: translateY(-100%);
    }
  </style>
</head>

<body class="app">
  <a href="#">
    <span style="--i:0" data-letter="H">H</span>
    <span style="--i:1" data-letter="O">O</span>
    <span style="--i:2" data-letter="M">M</span>
    <span style="--i:3" data-letter="E">E</span>
  </a>
</body>

</html>
