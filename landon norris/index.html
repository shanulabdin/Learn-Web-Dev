<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
      min-height: 90vh;
      background-color: rgb(36, 36, 36);
    }

    a {
      text-shadow: 0 40px 0 rgba(255, 255, 255, 0.7);
      color: orange;
      font-size: 30px;
      font-weight: 900;
      font-family: Arial, Helvetica, sans-serif;
      text-decoration: none;

      span {
        position: relative;
        display: inline-block;
        text-transform: uppercase;
      }

      &:hover {
        span {
          animation: up 0.5s forwards;
        }
      }
    }

    @keyframes up {
      100% {
        translate: 0 -100%;
      }
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body class="app">
  <a href="">
    <span>h</span>
    <span>o</span>
    <span>m</span>
    <span>e</span>
  </a>

</body>

</html>
