<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    :root {
      --bg-dark: #0F0E0C;
      /* ... your other variables */
    }

    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-dark);
      /* Use your custom dark hex */
    }

    .bg-mesh {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #0a0a0a;
      /* Your dark base */
      z-index: -1;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      will-change: transform;
    }

    .orb-1 {
      background: var(--orange-primary);
      /* Use your orange variable */
      top: -100px;
      right: -100px;
    }

    .orb-2 {
      background: #ff4500;
      /* A slightly deeper orange/red for contrast */
      bottom: 50px;
      left: 50px;
    }
  </style>
</head>

<body>
  <div class="bg-mesh">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
<script>
  const app = new PIXI.Application({
    width: 600,
    height: 600,
    backgroundAlpha: 0, // This makes the canvas transparent
    antialias: true
  });
  document.body.appendChild(app.view);

  // Load textures
  const img = PIXI.Sprite.from('img.png');
  const depthMap = PIXI.Sprite.from('depth.png');

  // Create the Displacement Filter
  const displacementFilter = new PIXI.DisplacementFilter(depthMap);

  // Add to stage
  app.stage.addChild(img);
  app.stage.addChild(depthMap);

  // CRITICAL: Hide the depth map so it doesn't render visually, 
  // but the filter can still read its pixel data.
  depthMap.visible = false;

  img.filters = [displacementFilter];

  window.addEventListener('mousemove', (e) => {
    // centering the math based on the canvas center for better precision
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    displacementFilter.scale.x = (centerX - e.clientX) / 50;
    displacementFilter.scale.y = (centerY - e.clientY) / 50;
  });

  const orbs = document.querySelectorAll('.orb');

  // Add this to your existing mousemove listener or animation loop
  window.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth) - 0.5;
    const y = (e.clientY / window.innerHeight) - 0.5;

    orbs.forEach((orb, index) => {
      // Index * 20 adds different speeds to each orb for more depth
      const factor = (index + 1) * 30;
      orb.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
    });
  });
</script>

</html>
