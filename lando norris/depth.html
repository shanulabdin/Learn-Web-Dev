<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    :root {
      --bg-dark: #0F0E0C;
    }

    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-dark);
    }

    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      padding: 120px 0 80px;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 80%;
      height: 150%;
      background: radial-gradient(ellipse at center, rgba(184, 134, 11, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .hero-title {
      font-size: clamp(44px, 5vw, 70px);
      color: var(--text-primary);
      margin-bottom: 24px;
      font-weight: 400;
    }

    .hero-title .gold {
      color: var(--orange-light);
      font-style: italic;
    }

    /* Add this to your <style> block */
    .hero-visual {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      max-width: 100%;
      /* Ensures it doesn't break your grid on smaller screens */
      height: auto !important;
      border-radius: 12px;
      /* Optional: matches a 'premium' look */
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px;
      width: 100%;
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="container">
      <div class="hero-grid">
        <div class="hero-content">

          <h1 class="hero-title">
            I Build <span class="gold">Premium</span><br>
            Websites
          </h1>
        </div>
        <div class="hero-visual">

        </div>
      </div>
    </div>
  </section>
</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
<script>
  // 1. Target the specific container
  const visualContainer = document.querySelector('.hero-visual');

  const app = new PIXI.Application({
    width: 600,
    height: 600,
    backgroundAlpha: 0,
    antialias: true
  });

  // 2. Append the canvas to the .hero-visual div
  visualContainer.appendChild(app.view);

  const img = PIXI.Sprite.from('img.png');
  const depthMap = PIXI.Sprite.from('depth.png');
  const displacementFilter = new PIXI.DisplacementFilter(depthMap);

  app.stage.addChild(img);
  app.stage.addChild(depthMap);
  depthMap.visible = false;
  img.filters = [displacementFilter];

  // 3. Optimized Mouse Movement
  window.addEventListener('mousemove', (e) => {
    // We calculate the distance from the center of the screen
    // This makes the image tilt based on the overall viewport
    const mouseX = e.clientX;
    const mouseY = e.clientY;

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    // Movement intensity (Divide by higher number for subtler movement)
    displacementFilter.scale.x = (centerX - mouseX) / 40;
    displacementFilter.scale.y = (centerY - mouseY) / 40;
  });
</script>

</html>
